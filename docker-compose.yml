services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: finance
      DB_USER: finance
      DB_PASSWORD: ${DB_PASSWORD:-finance_secret}
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      YANDEX_OAUTH_ID: ${YANDEX_OAUTH_ID}
      YANDEX_OAUTH_SECRET: ${YANDEX_OAUTH_SECRET}
    network_mode: "host"

volumes:
  pgdata:
